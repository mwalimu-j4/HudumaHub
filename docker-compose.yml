version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hudumahub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hudumahub
      POSTGRES_PASSWORD: hudumahub_dev_2024
      POSTGRES_DB: hudumahub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/prisma/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hudumahub"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Server API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hudumahub-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://hudumahub:hudumahub_dev_2024@postgres:5432/hudumahub
      SESSION_SECRET: hudumahub-docker-session-secret
      JWT_SECRET: hudumahub-docker-jwt-secret
      CORS_ORIGIN: http://localhost:5173
      CLIENT_URL: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/auth/google/callback
      AI_API_KEY: ${AI_API_KEY:-}
      AI_PROVIDER_URL: ${AI_PROVIDER_URL:-https://api.groq.com/openai/v1}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "5000:5000"
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

  # Client Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hudumahub-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public

volumes:
  pgdata:
